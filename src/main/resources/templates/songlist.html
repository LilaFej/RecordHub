<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>RecordHub Songs</title>
	<style>
		:root {
			--bg: #fff5f8;
			--panel: #fffafb;
			--border: #efbfd0;
			--strong: #b63e73;
			--strong-dark: #8c2454;
			--text: #3a2230;
			--muted: #7a5767;
			--table: #ffe4ec;
		}

		body {
			font-family: "Segoe UI", sans-serif;
			margin: 2rem;
			background: linear-gradient(180deg, #fff8fb 0%, #ffe8f0 100%);
			color: var(--text);
		}

		h1 {
			margin-bottom: 0.5rem;
		}

		.navbar {
			display: flex;
			flex-wrap: wrap;
			gap: 0.75rem;
			align-items: center;
			margin-bottom: 1.5rem;
		}

		.panel {
			background: var(--panel);
			border: 1px solid var(--border);
			border-radius: 1.25rem;
			padding: 1.5rem;
			box-shadow: 0 18px 40px rgba(182, 62, 115, 0.10);
		}

		.filter-bar {
			display: flex;
			flex-wrap: wrap;
			gap: 0.75rem;
			align-items: end;
			margin-bottom: 1.5rem;
			padding: 1rem;
			border: 1px solid #f2d0dd;
			border-radius: 1rem;
			background: #fff;
		}

		.filter-field {
			display: grid;
			gap: 0.35rem;
		}

		select {
			padding: 0.6rem 0.8rem;
			border: 1px solid #f2d0dd;
			border-radius: 0.85rem;
			background: white;
			color: var(--text);
		}

		table {
			border-collapse: collapse;
			width: 100%;
			background: white;
			border-radius: 1rem;
			overflow: hidden;
		}

		th,
		td {
			border: 1px solid #f2d0dd;
			padding: 0.75rem;
			text-align: left;
		}

		th {
			background: var(--table);
		}

		a,
		button {
			color: white;
			background: var(--strong);
			padding: 0.6rem 0.95rem;
			border-radius: 999px;
			text-decoration: none;
			border: none;
			font-weight: 600;
		}

		a:hover,
		button:hover {
			background: var(--strong-dark);
		}

		td a {
			display: inline-block;
			margin-right: 0.5rem;
			margin-bottom: 0.25rem;
		}

		.username-pill {
			padding: 0.5rem 0.9rem;
			border-radius: 999px;
			background: #ffd7e4;
			color: var(--strong-dark);
			font-weight: 700;
		}
	</style>
</head>
<body>
	<div class="panel">
	<h1>Song List</h1>
	<div class="navbar">
		<span class="username-pill" th:text="${currentUser.username}"></span>
		<a th:href="@{/addsong}">Add Song</a>
		<a th:href="@{/friends/list}">Friends</a>
		<form th:action="@{/logout}" method="post" style="display:inline; margin-left:0.75rem;">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<button type="submit">Logout</button>
		</form>
	</div>
	<form class="filter-bar" th:action="@{/songlist}" method="get">
		<div class="filter-field">
			<label for="genre">Genre</label>
			<select id="genre" name="genre">
				<option value="">All genres</option>
				<option th:each="genreOption : ${genres}" th:value="${genreOption}" th:text="${genreOption}" th:selected="${genreOption == selectedGenre}"></option>
			</select>
		</div>
		<div class="filter-field">
			<label for="playlistId">Playlist</label>
			<select id="playlistId" name="playlistId">
				<option value="">All playlists</option>
				<option th:each="playlist : ${searchPlaylists}" th:value="${playlist.id}" th:text="${playlist.name}" th:selected="${selectedPlaylistId != null and playlist.id == selectedPlaylistId}"></option>
			</select>
		</div>
		<button type="submit">Search</button>
		<a th:href="@{/songlist}">Clear</a>
	</form>
	<table>
		<thead>
			<tr>
				<th>Title</th>
				<th>Artist</th>
				<th>Album</th>
				<th>Release year</th>
				<th>Genre</th>
				<th>Playlist</th>
				<th>Actions</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="song : ${songs}">
				<td th:text="${song.title}"></td>
				<td th:text="${song.artist}"></td>
				<td th:text="${song.album}"></td>
				<td th:text="${song.releaseYear}"></td>
				<td th:text="${song.genre}"></td>
				<td th:text="${song.playlist != null ? song.playlist.name : 'Unassigned'}"></td>
				<td>
					<a th:href="@{/editsong/{id}(id=${song.id})}">Edit</a>
					<a th:href="@{/deletesong/{id}(id=${song.id})}">Delete</a>
				</td>
			</tr>
		</tbody>
	</table>
	</div>
</body>
</html>

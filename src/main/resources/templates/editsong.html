<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Edit Song</title>
	<style>
		:root {
			--bg: #fff5f8;
			--panel: #fffafb;
			--border: #efbfd0;
			--strong: #b63e73;
			--strong-dark: #8c2454;
			--text: #3a2230;
		}

		body {
			font-family: "Segoe UI", sans-serif;
			margin: 2rem;
			background: linear-gradient(180deg, #fff8fb 0%, #ffe8f0 100%);
			color: var(--text);
		}

		main {
			max-width: 34rem;
			background: var(--panel);
			border: 1px solid var(--border);
			border-radius: 1.25rem;
			padding: 1.75rem;
			box-shadow: 0 18px 40px rgba(182, 62, 115, 0.10);
		}

		form {
			display: grid;
			gap: 0.75rem;
		}

		label {
			display: grid;
			gap: 0.25rem;
		}

		input {
			padding: 0.5rem;
			border: 1px solid var(--border);
			border-radius: 0.75rem;
		}

		select {
			padding: 0.5rem;
			border: 1px solid var(--border);
			border-radius: 0.75rem;
		}

		a,
		button {
			color: white;
			background: var(--strong);
			padding: 0.6rem 0.95rem;
			border-radius: 999px;
			text-decoration: none;
			border: none;
			font-weight: 600;
		}

		.navbar {
			display: flex;
			gap: 0.75rem;
			align-items: center;
			margin-bottom: 1rem;
			flex-wrap: wrap;
		}

		.username-pill {
			padding: 0.5rem 0.9rem;
			border-radius: 999px;
			background: #ffd7e4;
			color: var(--strong-dark);
			font-weight: 700;
		}
	</style>
</head>
<body>
	<main>
	<h1>Edit Song</h1>
	<div class="navbar">
		<span class="username-pill" th:text="${currentUser.username}"></span>
		<a th:href="@{/songlist}">Back to song list</a>
		<form th:action="@{/logout}" method="post" style="display:inline; margin-left:0.75rem;">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<button type="submit">Logout</button>
		</form>
	</div>
	<form th:action="@{/updatesong}" th:object="${song}" method="post">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
		<input type="hidden" th:field="*{id}">
		<label>Title
			<input type="text" th:field="*{title}" required>
		</label>
		<label>Artist
			<input type="text" th:field="*{artist}" required>
		</label>
		<label>Album
			<input type="text" th:field="*{album}" required>
		</label>
		<label>Release year
			<input type="number" th:field="*{releaseYear}" required>
		</label>
		<label>Genre
			<input type="text" th:field="*{genre}" required>
		</label>
		<label>Playlist
			<select name="playlistId">
				<option value="">Unassigned</option>
				<option th:each="playlist : ${playlists}" th:value="${playlist.id}" th:text="${playlist.name}" th:selected="${song.playlist != null and song.playlist.id == playlist.id}"></option>
			</select>
		</label>
		<button type="submit">Update</button>
	</form>
	</main>
</body>
</html>

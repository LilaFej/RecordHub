<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Friends</title>
	<style>
		:root {
			--bg: #fff5f8;
			--panel: #fffafb;
			--border: #efbfd0;
			--strong: #b63e73;
			--strong-dark: #8c2454;
			--text: #3a2230;
			--muted: #7a5767;
		}

		body {
			font-family: "Segoe UI", sans-serif;
			margin: 2rem;
			background: linear-gradient(180deg, #fff8fb 0%, #ffe8f0 100%);
			color: var(--text);
		}

		main {
			background: var(--panel);
			border: 1px solid var(--border);
			border-radius: 1.25rem;
			padding: 1.75rem;
			box-shadow: 0 18px 40px rgba(182, 62, 115, 0.10);
		}

		section {
			margin-bottom: 2rem;
			padding: 1rem;
			background: white;
			border: 1px solid #f5d8e4;
			border-radius: 1rem;
		}

		ul {
			padding-left: 1.25rem;
		}

		form {
			display: inline;
		}

		button,
		a {
			margin-left: 0.5rem;
			color: white;
			background: var(--strong);
			padding: 0.6rem 0.95rem;
			border-radius: 999px;
			text-decoration: none;
			border: none;
			font-weight: 600;
		}

		.navbar {
			display: flex;
			gap: 0.75rem;
			align-items: center;
			margin-bottom: 1rem;
			flex-wrap: wrap;
		}
	</style>
</head>
<body>
	<main>
	<h1>Friends for <span th:text="${currentUser.username}"></span></h1>
	<div class="navbar">
		<a th:href="@{/songlist}">Back to songs</a>
		<form th:action="@{/logout}" method="post" style="display:inline; margin-left:0.75rem;">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<button type="submit">Logout</button>
		</form>
	</div>

	<section>
		<h2>Pending requests</h2>
		<ul>
			<li th:each="request : ${pendingRequests}">
				<span th:text="${request.requester.username}"></span>
				<form th:action="@{/friends/accept/{id}(id=${request.id})}" method="post">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
					<button type="submit">Accept</button>
				</form>
			</li>
		</ul>
		<p th:if="${#lists.isEmpty(pendingRequests)}">No pending requests.</p>
	</section>

	<section>
		<h2>Accepted friends</h2>
		<ul>
			<li th:each="friendship : ${acceptedFriendships}">
				<span th:text="${friendship.requester.id == currentUser.id ? friendship.recipient.username : friendship.requester.username}"></span>
				<a th:href="@{/friends/{id}/playlists(id=${friendship.requester.id == currentUser.id ? friendship.recipient.id : friendship.requester.id})}">View playlists</a>
			</li>
		</ul>
		<p th:if="${#lists.isEmpty(acceptedFriendships)}">No accepted friends yet.</p>
	</section>

	<section>
		<h2>Send a friend request</h2>
		<ul>
			<li th:each="user : ${candidateUsers}">
				<span th:text="${user.username}"></span>
				<form th:action="@{/friends/request/{id}(id=${user.id})}" method="post">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
					<button type="submit">Send request</button>
				</form>
			</li>
		</ul>
		<p th:if="${#lists.isEmpty(candidateUsers)}">No new users available.</p>
	</section>
	</main>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Friend Playlists</title>
	<style>
		:root {
			--bg: #fff5f8;
			--panel: #fffafb;
			--border: #efbfd0;
			--strong: #b63e73;
			--strong-dark: #8c2454;
			--text: #3a2230;
		}

		body {
			font-family: "Segoe UI", sans-serif;
			margin: 2rem;
			background: linear-gradient(180deg, #fff8fb 0%, #ffe8f0 100%);
			color: var(--text);
		}

		main {
			background: var(--panel);
			border: 1px solid var(--border);
			border-radius: 1.25rem;
			padding: 1.75rem;
			box-shadow: 0 18px 40px rgba(182, 62, 115, 0.10);
		}

		article {
			border: 1px solid #f5d8e4;
			padding: 1rem;
			margin-bottom: 1rem;
			border-radius: 1rem;
			background: white;
		}

		ul {
			padding-left: 1.25rem;
		}

		a,
		button {
			color: white;
			background: var(--strong);
			padding: 0.6rem 0.95rem;
			border-radius: 999px;
			text-decoration: none;
			border: none;
			font-weight: 600;
		}
	</style>
</head>
<body>
	<main>
	<h1><span th:text="${friend.username}"></span>'s playlists</h1>
	<p>
		Logged in as <strong th:text="${currentUser.username}"></strong>
		<a th:href="@{/friends/list}">Back to friends</a>
		<form th:action="@{/logout}" method="post" style="display:inline; margin-left:0.75rem;">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<button type="submit">Logout</button>
		</form>
	</p>
	<div th:if="${#lists.isEmpty(playlists)}">This friend has no playlists yet.</div>
	<article th:each="playlist : ${playlists}">
		<h2 th:text="${playlist.name}"></h2>
		<ul>
			<li th:each="song : ${playlist.songs}" th:text="${song.title + ' - ' + song.artist}"></li>
		</ul>
		<p th:if="${#lists.isEmpty(playlist.songs)}">No songs in this playlist.</p>
	</article>
	</main>
</body>
</html>

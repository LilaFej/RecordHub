<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>RecordHub Login</title>
	<style>
		:root {
			--bg: #fff5f8;
			--panel: #fffafb;
			--border: #efbfd0;
			--strong: #b63e73;
			--strong-dark: #8c2454;
			--text: #3a2230;
			--muted: #7a5767;
			--table: #ffe4ec;
		}

		body {
			font-family: "Segoe UI", sans-serif;
			margin: 2rem;
			display: grid;
			place-items: center;
			min-height: 90vh;
			background: linear-gradient(180deg, #fff7fa 0%, #ffe3ee 100%);
			color: var(--text);
		}

		main {
			width: min(26rem, 100%);
			border: 1px solid var(--border);
			padding: 2rem;
			background: var(--panel);
			box-shadow: 0 18px 45px rgba(182, 62, 115, 0.12);
			border-radius: 1.25rem;
		}

		form {
			display: grid;
			gap: 0.75rem;
		}

		label {
			display: grid;
			gap: 0.25rem;
		}

		input {
			padding: 0.5rem;
			border: 1px solid var(--border);
			border-radius: 0.75rem;
		}

		button,
		a.button-link {
			padding: 0.7rem 1rem;
			border-radius: 999px;
			border: none;
			background: var(--strong);
			color: white;
			text-decoration: none;
			font-weight: 600;
			text-align: center;
		}

		.error {
			color: #b00020;
		}

		.note {
			color: var(--muted);
			font-size: 0.95rem;
		}

		.actions {
			display: grid;
			gap: 0.75rem;
			margin-top: 1rem;
		}
	</style>
</head>
<body>
	<main>
		<h1>RecordHub Login</h1>
		<p class="error" th:if="${param.error}">Invalid username or password.</p>
		<p th:if="${param.logout}">You have been logged out.</p>
		<p th:if="${param.registered}">Your account is ready. Log in below.</p>
		<p th:if="${param.resetSuccess}">Your password has been updated.</p>
		<form th:action="@{/login}" method="post">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<label>Username
				<input type="text" name="username" required autofocus>
			</label>
			<label>Password
				<input type="password" name="password" required>
			</label>
			<button type="submit">Login</button>
		</form>
		<div class="actions">
			<a class="button-link" th:href="@{/register}">Create Account</a>
			<a class="button-link" th:href="@{/reset/request}">Forgot Password</a>
		</div>
		<p class="note">Create your own username and a password with at least 8 letters and 1 uppercase letter.</p>
		<p class="note">Admin login: admin / AdminOnly</p>
	</main>
</body>
</html>

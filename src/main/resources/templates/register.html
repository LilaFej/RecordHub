<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Create Account</title>
	<style>
		:root {
			--bg: #fff5f8;
			--panel: #fffafb;
			--border: #efbfd0;
			--strong: #b63e73;
			--strong-dark: #8c2454;
			--text: #3a2230;
			--muted: #7a5767;
		}

		body {
			font-family: "Segoe UI", sans-serif;
			margin: 2rem;
			display: grid;
			place-items: center;
			min-height: 90vh;
			background: linear-gradient(180deg, #fff7fa 0%, #ffe3ee 100%);
			color: var(--text);
		}

		main {
			width: min(30rem, 100%);
			border: 1px solid var(--border);
			padding: 2rem;
			background: var(--panel);
			box-shadow: 0 18px 45px rgba(182, 62, 115, 0.12);
			border-radius: 1.25rem;
		}

		form {
			display: grid;
			gap: 0.75rem;
		}

		label {
			display: grid;
			gap: 0.25rem;
		}

		input {
			padding: 0.5rem;
			border: 1px solid var(--border);
			border-radius: 0.75rem;
		}

		button,
		a {
			padding: 0.7rem 1rem;
			border-radius: 999px;
			border: none;
			background: var(--strong);
			color: white;
			text-decoration: none;
			font-weight: 600;
			text-align: center;
		}

		.actions {
			display: grid;
			gap: 0.75rem;
			margin-top: 1rem;
		}

		.error {
			color: #b00020;
		}

		.note {
			color: var(--muted);
		}
	</style>
</head>
<body>
	<main>
		<h1>Create Account</h1>
		<p class="note" th:text="${passwordPolicy}"></p>
		<form th:action="@{/register}" th:object="${registrationForm}" method="post">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<label>Username
				<input type="text" th:field="*{username}" required>
			</label>
			<p class="error" th:if="${usernameError}" th:text="${usernameError}"></p>
			<label>Email
				<input type="email" th:field="*{email}" required>
			</label>
			<p class="error" th:if="${emailError}" th:text="${emailError}"></p>
			<label>Password
				<input type="password" th:field="*{password}" required>
			</label>
			<label>Confirm password
				<input type="password" th:field="*{confirmPassword}" required>
			</label>
			<p class="error" th:if="${passwordError}" th:text="${passwordError}"></p>
			<button type="submit">Create account</button>
		</form>
		<div class="actions">
			<a th:href="@{/login}">Back to login</a>
		</div>
	</main>
</body>
</html>

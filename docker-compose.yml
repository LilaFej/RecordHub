version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: recordhub-postgres
    environment:
      POSTGRES_DB: recordhub
      POSTGRES_USER: recordhub
      POSTGRES_PASSWORD: recordhub
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recordhub -d recordhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recordhub-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/recordhub
      DB_USERNAME: recordhub
      DB_PASSWORD: recordhub
      APP_BASE_URL: http://localhost:8080
      MAIL_HOST: sandbox.smtp.mailtrap.io
      MAIL_PORT: 2525
      MAIL_USERNAME: change-me
      MAIL_PASSWORD: change-me
      MAIL_FROM: no-reply@recordhub.local
    ports:
      - "8080:8080"

volumes:
  postgres-data:
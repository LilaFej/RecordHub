spring.application.name=recordhub
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/recordhub}
spring.datasource.username=${DB_USERNAME:recordhub}
spring.datasource.password=${DB_PASSWORD:recordhub}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
spring.data.rest.base-path=/data-api
spring.data.rest.return-body-on-create=true
spring.data.rest.return-body-on-update=true
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:change-me}
spring.mail.password=${MAIL_PASSWORD:change-me}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:no-reply@recordhub.local}
app.base-url=${APP_BASE_URL:http://localhost:8080}
